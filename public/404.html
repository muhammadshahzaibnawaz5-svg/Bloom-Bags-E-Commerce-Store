<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
  <link rel="alternate icon" href="/favicon/favicon.ico" />
  <title>Page Not Found — Blome</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./src/style.css" />
  <style>
    .not-found {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 1.5rem;
    }
    .not-found-code {
      font-family: var(--font-display);
      font-size: clamp(5rem, 12vw, 10rem);
      font-weight: 800;
      color: var(--charcoal);
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .not-found-code span {
      color: var(--gold);
    }
    .not-found h1 {
      font-family: Brigila, var(--font-display), serif;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 500;
      color: var(--charcoal);
      margin-bottom: 0.75rem;
    }
    .not-found p {
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--muted);
      max-width: 420px;
      margin-bottom: 2rem;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main class="not-found">
    <div class="not-found-code">4<span>0</span>4</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/" class="btn-lime">Back to Homepage</a>
  </main>
</body>
</html>
